[package]

name = "tunnelclient"
version = "0.1.0"
authors = ["Chris Macklin <chris.macklin@gmail.com>"]
edition = "2021"

[lib]
name = "tunnelclient"
path = "src/lib.rs"

[[bin]]
name = "tunnelclient"

[dependencies]
rmp-serde.workspace = true
serde.workspace = true
lazy_static.workspace = true
log.workspace = true
simplelog.workspace = true
anyhow.workspace = true
derive_more.workspace = true
zmq.workspace = true

winit = "0.30"
wgpu = "23"
lyon = "1"
bytemuck = { version = "1", features = ["derive"] }
pollster = "0.4"
yaml-rust = "0.4"

streaming-stats = "0.2"
regex = "1"

zero_configure = { path = "../zero_configure" }
tunnels_lib = { path = "../tunnels_lib" }

hostname = "0.4"

[dev-dependencies]
image = "0.24"
tunnels = { path = "../tunnels" }
