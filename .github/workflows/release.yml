name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.13"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake librsvg create-dmg
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Generate icon
        run: scripts/generate-icon.sh

      - name: Build universal binaries
        run: scripts/build-universal.sh

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y.%m.%d)
          N=$(gh release list --json tagName -q "[.[] | select(.tagName | startswith(\"v${TODAY}\"))] | length" 2>/dev/null || echo 0)
          VERSION="${TODAY}-$((N + 1))"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION (tag: $TAG)"

      - name: Assemble app bundle and DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: scripts/bundle-app.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" dist/Tunnels.dmg \
            --title "Tunnels $VERSION" \
            --notes "Built from main at ${GITHUB_SHA::8}."

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force
