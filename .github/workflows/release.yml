name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.13"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake librsvg create-dmg
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: universal

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y.%m.%d)
          N=$(gh release list --json tagName -q "[.[] | select(.tagName | startswith(\"v${TODAY}\"))] | length" 2>/dev/null || echo 0)
          VERSION="${TODAY}-$((N + 1))"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION (tag: $TAG)"

      - name: Build app bundle and DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: scripts/build-app.sh

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)

          if [ -n "$PREV_TAG" ] && git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD~10..HEAD"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --format="### %s (%h)%n%n%b" | sed '/^$/N;/^\n$/d'
            echo ""
            echo "Built from main at ${GITHUB_SHA::8}."
          } > release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" dist/Tunnels.dmg \
            --title "Tunnels $VERSION" \
            --notes-file release_notes.md

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force
